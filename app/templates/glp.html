<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <title>Módulo GLP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="apple-touch-icon" href="/static/icon-192.png">
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#015249">
  <script src="/static/js/html5-qrcode.min.js"></script>


  <style>
    :root {
      --verde: #015249;
      --verde-osc: #003b35;
      --bg: #f4f6f7;
      --rojo: #cc0000;
      --rojo-osc: #990000;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Verdana, Geneva, Tahoma, sans-serif;
      background: radial-gradient(circle at top, #d7f2ec 0, #f6f7f8 45%, #f6f7f8 100%);
      color: #111827;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .header {
      width: 100%;
      max-width: 720px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px 0 20px;
    }

    .logo {
      max-height: 52px;
      width: auto;
      object-fit: contain;
    }

    .wrap {
      width: 100%;
      max-width: 720px;
      margin: 16px auto 40px;
      background: #ffffff;
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12);
      padding: 22px 18px 28px;
    }

    #saludo {
      color: var(--verde);
      font-size: 20px;
      text-align: left;
      margin: 0 0 6px;
      font-weight: 700;
    }

    #preguntaTexto {
      color: #111827;
      text-align: left;
      min-height: 24px;
      margin: 0 0 8px;
      font-size: 15px;
    }

    .menu {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .menu-btn {
      flex: 1 1 calc(50% - 10px);
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid #cfd8dc;
      background: #e5f4f1;
      color: #013b35;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, transform .05s, box-shadow .15s;
    }

    .menu-btn:hover {
      background: #015249;
      color: #ffffff;
      transform: translateY(-1px);
      box-shadow: 0 4px 10px rgba(0, 0, 0, .18);
    }

    #conversacion {
      margin-top: 14px;
    }

    #lectorQR {
      width: 100%;
      max-width: 420px;
      margin: 12px auto;
    }

    #respuestaInput {
      width: 100%;
      border: 1px solid #cfd8dc;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 15px;
      margin-top: 10px;
    }

    /* Estilos para el nuevo Select de Tipo de Granja */
    #respuestaSelect {
      width: 100%;
      border: 1px solid #cfd8dc;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 15px;
      margin-top: 10px;
      background-color: #ffffff;
      color: #111827;
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
      background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23007CB2%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
      background-repeat: no-repeat;
      background-position: right .7em top 50%;
      background-size: .65em auto;
    }

    #inputFoto {
      margin-top: 10px;
      font-size: 14px;
    }

    #preguntaSiNo {
      text-align: center;
      margin-top: 14px;
      display: none;
      gap: 8px;
      justify-content: center;
    }

    #btnSi,
    #btnNo {
      padding: 10px 18px;
      font-size: 15px;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      min-width: 90px;
    }

    #btnSi {
      background: #015249;
      margin-right: 6px;
    }

    #btnNo {
      background: #cc0000;
    }

    #botonEnviar {
      display: none;
      width: 100%;
      background: var(--verde);
      color: #ffffff;
      border: none;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
    }

    #botonEnviar:hover {
      background: var(--verde-osc);
    }

    #panelResumen {
      margin-top: 20px;
      background: #f9fbfb;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 16px 14px 18px;
      display: none;
      font-size: 14px;
    }

    #panelResumen h3 {
      margin-top: 0;
      margin-bottom: 8px;
      color: var(--verde-osc);
      font-size: 18px;
      text-align: center;
    }

    #panelResumen p {
      margin: 3px 0;
    }

    #panelResumen .resumen-msg {
      margin-top: 10px;
      font-weight: bold;
      color: #333333;
      text-align: center;
    }

    #btnCerrarResumen {
      margin-top: 14px;
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: none;
      background: var(--verde);
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    #btnCerrarResumen:hover {
      background: var(--verde-osc);
    }

    .logout {
      margin-top: 20px;
      display: inline-block;
      background: var(--rojo);
      color: #ffffff;
      padding: 8px 14px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }

    .logout:hover {
      background: var(--rojo-osc);
    }
    
    /* Aviso de operaciones pendientes de sincronizar */
    #syncWarning {
      display: none;
      width: 100%;
      background: #fff5f5;
      border-radius: 10px;
      border: 1px solid #ffcdd2;
      padding: 10px 12px;
      margin: 8px 0 10px;
      color: #b71c1c;
      font-size: 14px;
      line-height: 1.4;
    }

    #syncWarning-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
      font-weight: 700;
      color: #b71c1c;
    }

    #syncWarning-icon {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #b71c1c;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    #syncWarning-body {
      font-weight: 500;
      margin-bottom: 4px;
    }

    #syncWarning-steps {
      margin: 4px 0 0;
      padding-left: 18px;
      font-size: 13px;
    }

    #syncWarning-steps li {
      margin-bottom: 2px;
    }

    @media (max-width: 600px) {
      #syncWarning {
        font-size: 13px;
        padding: 8px 10px;
      }
      #syncWarning-steps {
        font-size: 12px;
      }
    }

    @media (max-width: 600px) {
      .header {
        flex-direction: column;
        align-items: center;
        gap: 6px;
      }

      .wrap {
        margin: 12px auto 28px;
        padding: 18px 14px 24px;
      }

      .menu-btn {
        flex: 1 1 100%;
      }
    }
  </style>

</head>

<body>
  <div class="header">
    <img src="{{ url_for('static', filename='logo_' + session['empresa'] + '.png') }}" class="logo" alt="Logo cliente">
    <img src="{{ url_for('static', filename='logo_energix360.png') }}" class="logo" alt="Logo Energix360">
  </div>

  <div class="wrap">
    <p id="saludo">¡Hola {{ session.get('nombre','Usuario') }}!</p>

    <div id="syncWarning" style="display:none;"></div>

    <p id="preguntaTexto"></p>

    <div id="menuOpciones" class="menu" style="display:flex">
      <button class="menu-btn" onclick="iniciarCalefaccion()">🔥 Iniciar calefacción</button>
      <button class="menu-btn" onclick="registrarTanqueo()">⛽ Registrar tanqueo</button>
      <button class="menu-btn" onclick="registrarConsumo()">📊 Registrar consumo</button>
      <button class="menu-btn" onclick="finalizarCalefaccion()">🔥 Finalizar calefacción</button>
    </div>

    <div id="conversacion" style="display:none">
      <div id="lectorQR" style="display:none"></div>
      
      <input id="respuestaInput" type="text" style="display:none" />
      
      <select id="respuestaSelect" style="display:none">
          <option value="">-- Seleccione --</option>
          <option value="Manual">Manual</option>
          <option value="Automatica">Automática</option>
          <option value="Mixta">Mixta</option>
      </select>

      <input id="inputFoto" type="file" accept="image/*" capture="environment" style="display:none" />
      
      <div id="preguntaSiNo" style="display:none;">
        <button id="btnSi">Sí</button>
        <button id="btnNo">No</button>
      </div>

      <button id="botonEnviar">Enviar</button>
    </div>

    <div id="panelResumen"></div>

    <a class="logout" href="/logout">Cerrar sesión</a>
  </div>

  <script>
    /* ======================================
    VARIABLES GLOBALES
    =======================================*/
    let registrarTanqueoData = { sede: "", tanques: [] };
    let tanquesDisponibles = [];
    let tanqueActualIndex = 0;
    let GLP_OPERACION_EN_CURSO = false;

    // Bloqueo de salida
    function bloquearSalida(e) {
        if (GLP_OPERACION_EN_CURSO) {
            e.preventDefault();
            e.returnValue = "";
            return "";
        }
    }
    function activarProteccionOperacion() {
        GLP_OPERACION_EN_CURSO = true;
        window.addEventListener("beforeunload", bloquearSalida);
    }
    function desactivarProteccionOperacion() {
        GLP_OPERACION_EN_CURSO = false;
        window.removeEventListener("beforeunload", bloquearSalida);
    }

    // Bloqueo botón atrás
    function bloquearBotonAtras() {
        history.pushState(null, "", location.href);
        window.onpopstate = function () {
            if (GLP_OPERACION_EN_CURSO) {
                history.pushState(null, "", location.href);
                alert("No puedes retroceder mientras realizas una operación GLP.");
            } else {
                history.go(-1);
            }
        };
    }
    window.addEventListener("load", bloquearBotonAtras);

    /* ============================
    Normalización + lector de QR
    ============================ */
    function normalizarQR(decodedText) {
      let sede = "", empresa = "", tanques_qr = null;
      try {
        const obj = JSON.parse(decodedText);
        if (obj && (obj.sede || obj.empresa)) {
          sede = (obj.sede || "").trim();
          empresa = (obj.empresa || "").trim();
          if (Array.isArray(obj.tanques)) {
            tanques_qr = obj.tanques.map(t => ({
              numero: String(t.numero || "").toLowerCase().trim(),
              capacidad: Number(t.capacidad || 0)
            })).filter(t => t.numero);
          }
        }
      } catch (_) { }

      if (!sede) {
        try {
          const u = new URL(decodedText);
          sede = (u.searchParams.get("sede") || "").trim();
          empresa = (u.searchParams.get("empresa") || "").trim();
        } catch (_) { }
      }

      if (!sede && decodedText.includes("|")) {
        const [s, e] = decodedText.split("|", 2);
        sede = (s || "").trim();
        empresa = (e || "").trim();
      }

      if (!sede) { sede = (decodedText || "").trim(); }

      sede = sede.replace(/\u00A0/g, " ").replace(/\s+/g, " ").trim();
      empresa = empresa.replace(/\u00A0/g, " ").replace(/\s+/g, " ").trim();

      return { sede, empresa, tanques: tanques_qr };
    }

    /* ===================================================
       UTILIDADES OFFLINE
    =================================================== */
    const DB_NAME = "glp_offline_db";
    const STORE = "queue";

    function openDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = () => {
          const db = req.result;
          if (!db.objectStoreNames.contains(STORE)) {
            db.createObjectStore(STORE, { keyPath: "id", autoIncrement: true });
          }
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function idbAdd(item) {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE, "readwrite");
        tx.objectStore(STORE).add(item);
        tx.oncomplete = () => resolve(true);
        tx.onerror = () => reject(tx.error);
      });
    }

    async function idbGetAll() {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE, "readonly");
        const req = tx.objectStore(STORE).getAll();
        req.onsuccess = () => resolve(req.result || []);
        req.onerror = () => reject(req.error);
      });
    }

    async function idbClear() {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE, "readwrite");
        tx.objectStore(STORE).clear();
        tx.oncomplete = () => resolve(true);
        tx.onerror = () => reject(tx.error);
      });
    }

    async function enqueueOffline(item) {
      await idbAdd({ ...item, ts: Date.now() });
    }

    async function getQueue() {
      try { return await idbGetAll(); }
      catch { return []; }
    }

    async function setQueue(q) {
      await idbClear();
      for (const it of q) await idbAdd(it);
    }

    let GLP_LOGIN_WARNING_SHOWN = false;

    async function flushOfflineQueue() {
      if (!navigator.onLine) return;
      const q = await getQueue();
      if (!q.length) return;

      const remaining = [];
      let needLoginForSync = false;

      for (const it of q) {
        if (needLoginForSync) {
          remaining.push(it);
          continue;
        }
        try {
          if (!it.payload.op_id) it.payload.op_id = generarOpId();
          const r = await fetch(it.url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(it.payload)
          });
          const status = r.status;
          const ct = (r.headers.get("content-type") || "").toLowerCase();

          if (!ct.includes("application/json")) {
            if (status === 302 || status === 401 || status === 403 || ct.includes("text/html")) {
              console.warn("Falta sesión. Deteniendo sync.");
              needLoginForSync = true;
              remaining.push(it);
              continue;
            }
            throw new Error("non-json-response");
          }
          const j = await r.json();
          if (!j.success) {
            console.error("Backend error:", j);
            remaining.push(it);
          }
        } catch (e) {
          console.error("Network error:", e);
          remaining.push(it);
        }
      }

      await setQueue(remaining);

      if (q.length > remaining.length) {
          alert("Las operaciones realizadas sin conexión se completaron correctamente.");
      }

      if (needLoginForSync && !GLP_LOGIN_WARNING_SHOWN) {
        GLP_LOGIN_WARNING_SHOWN = true;
        mostrarAvisoSyncPendiente();
        alert("Sesión expirada. Por favor inicia sesión nuevamente para enviar los datos pendientes.");
      }
    }

    function programarFlushOffline() {
      window.addEventListener("online", flushOfflineQueue);
      window.addEventListener("load", flushOfflineQueue);
      setInterval(() => {
        if (navigator.onLine) flushOfflineQueue();
      }, 15000);
    }
    programarFlushOffline();

    // Cache Tanques
    const TANQUES_CACHE_PREFIX = "tanques_cache_";
    function cacheTanquesLocal(sede, tanques) {
      localStorage.setItem(TANQUES_CACHE_PREFIX + sede, JSON.stringify({ tanques, ts: Date.now() }));
    }
    function getTanquesLocal(sede) {
      try { return JSON.parse(localStorage.getItem(TANQUES_CACHE_PREFIX + sede) || "null"); } 
      catch { return null; }
    }

    async function obtenerTanquesConFallback(sede) {
      if (navigator.onLine) {
        try {
          const r = await fetch("/glp/obtener_tanques", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ sede })
          });
          const ct = (r.headers.get("content-type") || "").toLowerCase();
          if (r.ok && ct.includes("application/json")) {
            const d = await r.json();
            if (d.success && Array.isArray(d.tanques) && d.tanques.length) {
              cacheTanquesLocal(sede, d.tanques);
              return { tanques: d.tanques, fuente: "bd" };
            }
          }
        } catch (e) { console.error(e); }
      }
      
      if (Array.isArray(tanquesQR) && tanquesQR.length) {
        cacheTanquesLocal(sede, tanquesQR);
        return { tanques: tanquesQR, fuente: "qr" };
      }

      const cached = getTanquesLocal(sede);
      if (cached && Array.isArray(cached.tanques) && cached.tanques.length) {
        return { tanques: cached.tanques, fuente: "cache", ts: cached.ts };
      }

      throw new Error("No hay tanques disponibles");
    }

    async function sendWithOffline(url, payload, onSuccess) {
      if (!payload.op_id) payload.op_id = generarOpId();
      try {
        const r = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const ct = (r.headers.get("content-type") || "").toLowerCase();
        if (!ct.includes("application/json")) throw new Error("non-json-response");
        const j = await r.json();
        if (!j.success) throw new Error(j.message || "Error servidor");
        if (typeof onSuccess === "function") onSuccess(j);
        limpiarEstadoOperacion();
        return j;
      } catch (e) {
        const isOffline = !navigator.onLine || String(e).includes("Failed to fetch") || String(e).includes("NetworkError");
        if (isOffline) {
          await enqueueOffline({ url, payload });
          const fakeResponse = {
            success: true, offline: true,
            message: "Guardado offline. Se enviará al recuperar señal.",
            op_id: payload.op_id, data: payload
          };
          if (typeof onSuccess === "function") onSuccess(fakeResponse);
          else { alert(fakeResponse.message); mostrarMenu(); }
          limpiarEstadoOperacion();
          return fakeResponse;
        }
        alert("Error: " + (e.message || e));
        throw e;
      }
    }

    function leerQR(titulo) {
      return new Promise((resolve, reject) => {
        const menu = document.getElementById("menuOpciones");
        const convo = document.getElementById("conversacion");
        const lector = document.getElementById("lectorQR");
        const texto = document.getElementById("preguntaTexto");
        if (menu) menu.style.display = "none";
        if (convo) convo.style.display = "block";
        if (lector) lector.style.display = "block";
        if (texto) texto.textContent = titulo || "Escanea el QR de la sede";
        lector.innerHTML = "";
        const qr = new Html5Qrcode("lectorQR");
        qr.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (decodedText) => {
          qr.stop().then(() => {
            lector.innerHTML = "";
            resolve(normalizarQR(decodedText));
          });
        }).catch(err => reject(err));
      });
    }

    function show(el, disp = "block") { if (el) el.style.display = disp; }
    function hide(el) { if (el) el.style.display = "none"; }
    const EMPRESA_SESION = "{{ session.get('empresa','') }}";

    function mostrarAvisoSyncPendiente() {
      const div = document.getElementById("syncWarning");
      if (div) {
          div.style.display = "block";
          div.innerHTML = `<b>Nota:</b> Tienes operaciones pendientes de enviar. Conéctate a internet para sincronizar.`;
      }
    }

    let sedeQR = "", empresaQR = "";
    let tanques = [], tanquesQR = [], items = [], idx = 0;

    function tituloOperacion(op) {
      switch (op) {
        case "inicio_calefaccion": return "Resumen - Inicio de calefacción";
        case "tanqueo": return "Resumen - Tanqueo de GLP";
        case "consumo": return "Resumen - Registro de consumo";
        case "finalizar_calefaccion": return "Resumen - Finalización de calefacción";
        default: return "Resumen de operación GLP";
      }
    }

    function mostrarResumenOperacion(resp) {
      desactivarProteccionOperacion();
      const panel = document.getElementById("panelResumen");
      const menu = document.getElementById("menuOpciones");
      const convo = document.getElementById("conversacion");
      const pregunta = document.getElementById("preguntaTexto");

      if (!panel) {
        alert(resp.message); mostrarMenu(); return;
      }
      const r = resp.resumen || {};
      const op = r.operacion || "";
      if (pregunta) pregunta.textContent = resp.message || "Operación finalizada.";

      const tanques = Array.isArray(r.tanques) ? r.tanques : [];
      const filas = tanques.map(t => `<tr><td>${t.numero||""}</td><td>${t.nivel||""}%</td><td>${t.capacidad||""}</td></tr>`).join("");
      
      let html = `<h3>${tituloOperacion(op)}</h3>`;
      html += `<p><strong>Sede:</strong> ${r.sede || ""}</p>`;
      html += `<p><strong>Lote:</strong> ${r.lote || ""}</p>`;
      
      if(r.pollitos) html += `<p><strong>Pollitos:</strong> ${r.pollitos}</p>`;
      if(r.tipo_granja) html += `<p><strong>Tipo Granja:</strong> ${r.tipo_granja}</p>`;
      
      if (tanques.length) {
          html += `<table><thead><tr><th>TK</th><th>Nivel</th><th>Cap</th></tr></thead><tbody>${filas}</tbody></table>`;
      }
      
      html += `<p class="resumen-msg">${resp.message || ""}</p>`;
      html += `<button id="btnCerrarResumen" onclick="cerrarResumen()">Volver al menú</button>`;
      
      panel.innerHTML = html;
      if (menu) menu.style.display = "none";
      if (convo) convo.style.display = "none";
      panel.style.display = "block";
    }

    function cerrarResumen() {
      desactivarProteccionOperacion();
      hide(document.getElementById("panelResumen"));
      mostrarMenu();
    }

    function manejarRespuestaOperacion(resp) {
      if (!resp) { alert("Error."); mostrarMenu(); return; }
      if (resp.resumen) mostrarResumenOperacion(resp);
      else { alert(resp.message || "Operación exitosa"); mostrarMenu(); }
    }

    async function cargarTanques(callback) {
      try {
        const res = await obtenerTanquesConFallback(sedeQR);
        tanques = Array.isArray(res.tanques) ? res.tanques : [];
        if (tanques.length === 0) { alert("No se encontraron tanques."); mostrarMenu(); return; }
        tanques = tanques.map(t => ({
          numero: String(t.numero || t.etiqueta || "").toLowerCase(),
          capacidad: Number(t.capacidad || 0)
        }));
        if (callback) callback();
      } catch (err) { console.error(err); mostrarMenu(); }
    }

    function mostrarMenu() {
      desactivarProteccionOperacion();
      // Limpiamos la pregunta para que no quede basura visual
      const txt = document.getElementById("preguntaTexto");
      if(txt) txt.textContent = "";
      
      document.getElementById("menuOpciones").style.display = "flex";
      document.getElementById("conversacion").style.display = "none";
    }

    async function comprimirImagenArchivo(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const img = new Image();
          img.onload = () => {
            let w = img.width, h = img.height, max = 1024;
            if (w > h) { if (w > max) { h = Math.round(h * max / w); w = max; } }
            else { if (h > max) { w = Math.round(w * max / h); h = max; } }
            const canvas = document.createElement("canvas");
            canvas.width = w; canvas.height = h;
            canvas.getContext("2d").drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL("image/jpeg", 0.7));
          };
          img.src = reader.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function preguntarNivelFoto(onFinish) {
      const texto = document.getElementById("preguntaTexto");
      const input = document.getElementById("respuestaInput");
      const select = document.getElementById("respuestaSelect");
      const foto = document.getElementById("inputFoto");
      const btn = document.getElementById("botonEnviar");

      if (idx >= tanques.length) {
        hide(input); hide(select); hide(foto); hide(btn);
        if (onFinish) onFinish();
        return;
      }

      const tk = tanques[idx];
      let nivelActual = 0, archivoFoto = null;

      hide(foto); hide(select); show(input);
      input.type = "number"; input.value = "";
      texto.textContent = `Nivel actual del ${tk.numero} (0-100%)`;
      btn.textContent = "Guardar nivel"; show(btn);

      btn.onclick = () => {
        const val = Number(input.value);
        if (isNaN(val) || val < 0 || val > 100) { alert("Nivel inválido (0-100)"); return; }
        nivelActual = val;
        pedirFoto();
      };

      function pedirFoto() {
        hide(input);
        texto.textContent = `Adjunta la foto del ${tk.numero}`;
        foto.value = null; show(foto);
        btn.textContent = "Subir foto y continuar";
        
        btn.onclick = async () => {
          if (!foto.files[0]) { alert("Sube foto."); return; }
          try {
            const b64 = await comprimirImagenArchivo(foto.files[0]);
            items.push({ numero: tk.numero, capacidad: tk.capacidad, nivel: nivelActual, testigo: b64 });
            idx++;
            preguntarNivelFoto(onFinish);
          } catch(e) { alert("Error foto"); }
        };
      }
    }

    function generarOpId() {
      if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
      return "op_" + Date.now() + "_" + Math.random();
    }

    function limpiarEstadoOperacion() {
      desactivarProteccionOperacion();
      items = []; idx = 0; tanques = [];
      const input = document.getElementById("respuestaInput");
      const select = document.getElementById("respuestaSelect");
      const foto = document.getElementById("inputFoto");
      const btn = document.getElementById("botonEnviar");
      const siNo = document.getElementById("preguntaSiNo");
      
      if(input) input.value = "";
      if(select) { select.value = ""; hide(select); }
      if(foto) foto.value = "";
      if(btn) hide(btn);
      if(siNo) hide(siNo);
      
      hide(document.getElementById("conversacion"));
      hide(document.getElementById("lectorQR"));
    }

    /* ============================
    INICIAR CALEFACCIÓN (MODIFICADO)
    ============================ */
    async function iniciarCalefaccion() {
      activarProteccionOperacion();
      try {
        const info = await leerQR("Escanea el QR de la sede para iniciar calefacción");
        sedeQR = info.sede;
        
        const texto = document.getElementById("preguntaTexto");
        const input = document.getElementById("respuestaInput");
        const select = document.getElementById("respuestaSelect");
        const foto = document.getElementById("inputFoto");
        const btn = document.getElementById("botonEnviar");
        
        hide(document.getElementById("preguntaSiNo"));
        items = []; idx = 0;

        function despuesDeAvicola() {
          cargarTanques(() => { preguntarNivelFoto(enviarInicio); });
        }

        if (EMPRESA_SESION === "Pollos GAR SAS") {
          // 1. Pedir Pollitos
          show(input); hide(select); hide(foto);
          input.type = "number"; input.value = "";
          texto.textContent = "¿Con cuántos pollitos inicias el lote?";
          btn.textContent = "Confirmar"; show(btn);
          
          btn.onclick = () => {
            const pollitos = Number(input.value || 0);
            if (isNaN(pollitos) || pollitos <= 0) { alert("Número inválido."); return; }
            
            // 2. Pedir Tipo de Granja (CAMBIO CRÍTICO APLICADO)
            hide(input);
            show(select); // Mostrar el dropdown
            select.value = ""; 
            texto.textContent = "¿La granja es Manual, Automática o Mixta?";
            
            btn.onclick = () => {
                const tipo = select.value;
                if (!tipo) { alert("Debes seleccionar el tipo de granja."); return; }
                
                // Guardar en dataset para usarlo al enviar
                input.dataset.pollitos = String(pollitos);
                input.dataset.tipo_granja = tipo;
                
                hide(btn); hide(select);
                despuesDeAvicola();
            };
          };
        } else {
          // Otras empresas (flujo simple)
          hide(input); hide(select); hide(btn);
          despuesDeAvicola();
        }
      } catch (e) {
        alert("Error QR: " + e); mostrarMenu();
      }
    }

    function enviarInicio() {
      // Recuperar los datos guardados en el paso anterior
      const pollitos = Number(document.getElementById("respuestaInput").dataset.pollitos || 0) || null;
      const tipo_granja = document.getElementById("respuestaInput").dataset.tipo_granja || null;

      const payload = {
        sede: sedeQR,
        // Enviar pollitos y tipo_granja si es Pollos GAR, si no null
        pollitos: (EMPRESA_SESION === "Pollos GAR SAS" ? pollitos : null),
        tipo_granja: (EMPRESA_SESION === "Pollos GAR SAS" ? tipo_granja : null),
        tanques: items
      };

      sendWithOffline("/glp/registrar_inicio", payload, manejarRespuestaOperacion);
    }

    /* ============================
    OTRAS OPERACIONES (SIN CAMBIOS)
    ============================ */
    async function registrarTanqueo() {
      // ... (Lógica existente de registro tanqueo se mantiene igual que en tu archivo original)
      // Para brevedad, re-uso el flujo genérico pero apuntando a las funciones específicas
      activarProteccionOperacion();
      try {
          registrarTanqueoData = { sede: "", tanques: [] };
          tanqueActualIndex = 0;
          const info = await leerQR("QR Sede - Tanqueo");
          sedeQR = info.sede; registrarTanqueoData.sede = sedeQR;
          
          cargarTanquesTanqueo(() => {
             tanqueActualIndex = 0;
             preguntarSiTanquearTanqueActual();
          });
      } catch(e) { alert("Error: "+e); mostrarMenu(); }
    }
    
    // Funciones auxiliares de tanqueo (simplificadas para encajar en el bloque, 
    // asegurando que usen los elementos UI correctamente)
    async function cargarTanquesTanqueo(cb) {
        try {
            const res = await obtenerTanquesConFallback(sedeQR);
            tanquesDisponibles = res.tanques || [];
            if(!tanquesDisponibles.length) { alert("No hay tanques"); mostrarMenu(); return; }
            tanquesDisponibles = tanquesDisponibles.map(t => ({numero: String(t.numero||t.etiqueta).toLowerCase(), capacidad: Number(t.capacidad||0)}));
            if(cb) cb();
        } catch(e) { console.error(e); mostrarMenu(); }
    }

    function preguntarSiTanquearTanqueActual() {
        if(tanqueActualIndex >= tanquesDisponibles.length) { enviarTanqueo(); return; }
        const tk = tanquesDisponibles[tanqueActualIndex];
        const texto = document.getElementById("preguntaTexto");
        const sn = document.getElementById("preguntaSiNo");
        hide(document.getElementById("respuestaInput")); hide(document.getElementById("inputFoto")); hide(document.getElementById("botonEnviar"));
        
        texto.textContent = `¿Desea tanquear ${tk.numero.toUpperCase()}?`;
        show(sn);
        
        document.getElementById("btnSi").onclick = () => {
            hide(sn); prepararDatosTanqueActual(tk); pedirNivelInicial();
        };
        document.getElementById("btnNo").onclick = () => {
            hide(sn); tanqueActualIndex++; preguntarSiTanquearTanqueActual();
        };
    }
    
    let tanqueActualDatos = null;
    function prepararDatosTanqueActual(tk) {
        tanqueActualDatos = { numero: tk.numero, capacidad: tk.capacidad };
    }
    
    function pedirNivelInicial() {
        const inp = document.getElementById("respuestaInput");
        const btn = document.getElementById("botonEnviar");
        const txt = document.getElementById("preguntaTexto");
        show(inp); inp.type="number"; inp.value=""; 
        txt.textContent = `Nivel INICIAL ${tanqueActualDatos.numero} (0-100)`;
        show(btn); btn.textContent="Confirmar";
        btn.onclick = () => {
            const n = Number(inp.value);
            if(isNaN(n) || n<0 || n>100) { alert("Nivel inválido"); return; }
            tanqueActualDatos.nivel_inicial = n;
            pedirFotoGenerica("NIVEL INICIAL", (b64) => {
                tanqueActualDatos.foto_nivel_inicial = b64;
                // Mensaje intermedio
                hide(inp); hide(document.getElementById("inputFoto"));
                txt.textContent = "Procede a tanquear. Pulsa Continuar al finalizar.";
                btn.textContent = "Continuar";
                btn.onclick = () => pedirNivelFinal();
            });
        }
    }
    
    function pedirNivelFinal() {
        const inp = document.getElementById("respuestaInput");
        const btn = document.getElementById("botonEnviar");
        const txt = document.getElementById("preguntaTexto");
        show(inp); inp.value=""; 
        txt.textContent = `Nivel FINAL ${tanqueActualDatos.numero} (0-100)`;
        btn.textContent="Confirmar";
        btn.onclick = () => {
            const n = Number(inp.value);
            if(isNaN(n) || n<0 || n>100) { alert("Nivel inválido"); return; }
            tanqueActualDatos.nivel_final = n;
            pedirFotoGenerica("NIVEL FINAL", (b64) => {
                tanqueActualDatos.foto_nivel_final = b64;
                pedirDensidad();
            });
        }
    }
    
    // CORRECCIÓN UI: Ocultar inputFoto al pedir datos numéricos
    function pedirDensidad() {
        const inp = document.getElementById("respuestaInput");
        const btn = document.getElementById("botonEnviar");
        const txt = document.getElementById("preguntaTexto");
        hide(document.getElementById("inputFoto")); // <-- CORRECCIÓN AQUÍ
        show(inp); inp.value=""; inp.step="0.01";
        txt.textContent = "Densidad Suministrada (kg/gal)";
        btn.onclick = () => {
            const d = Number(inp.value);
            if(isNaN(d) || d<=0) { alert("Dato inválido"); return; }
            tanqueActualDatos.densidad_suministrada = d;
            pedirKg();
        }
    }
    
    function pedirKg() {
        const inp = document.getElementById("respuestaInput");
        const btn = document.getElementById("botonEnviar");
        const txt = document.getElementById("preguntaTexto");
        hide(document.getElementById("inputFoto")); // <-- CORRECCIÓN AQUÍ
        show(inp); inp.value=""; 
        txt.textContent = "Kg Suministrados (Factura)";
        btn.onclick = () => {
            const k = Number(inp.value);
            if(isNaN(k) || k<=0) { alert("Dato inválido"); return; }
            tanqueActualDatos.kg_suministrados = k;
            pedirFotoGenerica("BAUCHER", (b64) => {
                tanqueActualDatos.foto_baucher = b64;
                registrarTanqueoData.tanques.push(tanqueActualDatos);
                tanqueActualIndex++;
                preguntarSiTanquearTanqueActual();
            });
        }
    }
    
    function pedirFotoGenerica(label, cb) {
        const f = document.getElementById("inputFoto");
        const btn = document.getElementById("botonEnviar");
        const txt = document.getElementById("preguntaTexto");
        const inp = document.getElementById("respuestaInput");
        hide(inp); show(f); f.value=null;
        txt.textContent = `Foto ${label}`;
        btn.textContent = "Subir y Continuar";
        btn.onclick = async () => {
            if(!f.files[0]) { alert("Falta foto"); return; }
            const b64 = await comprimirImagenArchivo(f.files[0]);
            cb(b64);
        }
    }
    
    function enviarTanqueo() {
        sendWithOffline("/glp/registrar_tanqueo", registrarTanqueoData, manejarRespuestaOperacion);
    }

    async function registrarConsumo() {
      activarProteccionOperacion();
      try {
        const info = await leerQR("QR Sede - Consumo");
        sedeQR = info.sede; items = []; idx = 0;
        cargarTanques(() => { preguntarNivelFoto(enviarConsumo); });
      } catch(e) { alert("Error: "+e); mostrarMenu(); }
    }
    function enviarConsumo() {
        sendWithOffline("/glp/registrar_consumo", {sede: sedeQR, tanques: items}, manejarRespuestaOperacion);
    }

    async function finalizarCalefaccion() {
      activarProteccionOperacion();
      try {
        const info = await leerQR("QR Sede - Finalizar");
        sedeQR = info.sede; items = []; idx = 0;
        cargarTanques(() => { preguntarNivelFoto(enviarFinalizar); });
      } catch(e) { alert("Error: "+e); mostrarMenu(); }
    }
    function enviarFinalizar() {
        sendWithOffline("/glp/finalizar_calefaccion", {sede: sedeQR, tanques: items}, manejarRespuestaOperacion);
    }

    // Handlers logout
    function actualizarBloqueoLogout() {
        const links = document.querySelectorAll('a[href="/logout"]');
        links.forEach(a => {
            a.onclick = null;
            a.addEventListener("click", function(e) {
                if (GLP_OPERACION_EN_CURSO) {
                    e.preventDefault(); alert("Termina la operación primero."); return;
                }
                if (!navigator.onLine) {
                    e.preventDefault(); alert("Necesitas internet para cerrar sesión."); return;
                }
            });
        });
    }
    window.addEventListener("load", actualizarBloqueoLogout);
  </script>
